services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: sentinel_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sentinel_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - postgres15_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6380:6379" # Map host 6380 to container 6379
    volumes:
      - redis_data:/data

  execution-engine:
    build: ./execution-engine
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sentinel_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_SQL_INIT_MODE: always
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MT5_BRIDGE_URL: http://host.docker.internal:9000/execute
    ports:
      - "8081:8080"

volumes:
  postgres15_data:
  redis_data: